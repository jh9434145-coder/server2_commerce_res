name: Reservation Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest

      # GCP Server 2 배포
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_SSH_S2_KEY }}
          script: |
            # 1. 폴더 이동 및 코드 업데이트
            cd /home/oksm1003/reservation
            git pull origin main
            
            # 2. GitHub Secrets를 이용해서 서버에 .env 파일 생성 [cite: 2026-02-11]
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
            echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env
            echo "TZ=Asia/Seoul" >> .env
            
            # 3. 컨테이너 재시작 [cite: 2026-02-14]
            docker compose pull
            docker compose up -d
            docker image prune -f