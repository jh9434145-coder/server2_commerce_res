name: Reservation Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest

      # GCP Server 2 배포 (시크릿 이름 GCP_KEY로 수정)
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_KEY }}
          script: |
            mkdir -p /home/oksm1003/reservation
            cd /home/oksm1003/reservation
            
            # 1. 환경 변수 파일 생성 (.env)
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DATABASE_URL=postgres://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@34.158.208.117:5432/msa_core_db" >> .env
            echo "RABBITMQ_URL=amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASSWORD }}@34.158.208.117:5672" >> .env
            echo "PORT=8082" >> .env
            
            # 2. docker-compose.yml 파일 생성
            cat <<EOF > docker-compose.yml
            services:
              reservation:
                image: ${{ secrets.DOCKER_USERNAME }}/msa-reservation:latest
                container_name: reservation-service
                restart: always
                ports:
                  - "8082:8082"
                env_file: .env
                networks:
                  - msa-network

            networks:
              msa-network:
                external: true
            EOF
            
            # 3. 컨테이너 실행
            docker compose pull
            docker compose up -d
            docker image prune -f